name: Android CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    name: Build And Test
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore google-services.json
        if: ${{ env.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        env:
          GOOGLE_SERVICES_SECRET: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          secret = os.environ.get('GOOGLE_SERVICES_SECRET', '')
          target = Path('app/google-services.json')
          stripped = secret.lstrip()

          if stripped.startswith('{'):
              target.write_text(secret, encoding='utf-8')
          else:
              normalized = ''.join(secret.split())
              decoded = base64.b64decode(normalized)
              target.write_bytes(decoded)
          PY

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Assemble debug
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anonymousmeetup-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

  deploy-firestore:
    name: Deploy Firestore Rules And Indexes
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Firebase service account secret
        id: check-secret
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy because secret is missing
        if: ${{ steps.check-secret.outputs.configured != 'true' }}
        run: echo "FIREBASE_SERVICE_ACCOUNT_JSON is not configured. Skipping Firestore deploy."

      - name: Set up Node.js
        if: ${{ steps.check-secret.outputs.configured == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        if: ${{ steps.check-secret.outputs.configured == 'true' }}
        run: npm install -g firebase-tools

      - name: Restore Firebase service account
        if: ${{ steps.check-secret.outputs.configured == 'true' }}
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          cat > "$RUNNER_TEMP/firebase-service-account.json" <<'JSON'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          JSON
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy Firestore
        if: ${{ steps.check-secret.outputs.configured == 'true' }}
        run: firebase deploy --only firestore --project anonymousmeetup-b5fb8 --non-interactive
