name: Android CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    name: Build And Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        run: echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > app/google-services.json

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Assemble debug
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anonymousmeetup-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

  deploy-firestore:
    name: Deploy Firestore Rules And Indexes
    needs: build
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main') && secrets.FIREBASE_SERVICE_ACCOUNT_JSON != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Restore Firebase service account
        run: |
          cat > "$RUNNER_TEMP/firebase-service-account.json" <<'JSON'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          JSON
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy Firestore
        run: firebase deploy --only firestore --project anonymousmeetup-b5fb8 --non-interactive
